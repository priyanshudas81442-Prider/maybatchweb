<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            border: 2px solid black;
            height:400px;
            width:1485px;
            text-align:center;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 5px;
            background-color: rgb(0, 249, 241);
            box-shadow: o 4px 8px rgb(0, 0, 0);
            display: flex;
            justify-content: space-evenly;
        }
        .product img{
          width:100%;
          height: 200px;
          object-fit: cover;
          border-radius: 11px;
          border: 1px solid rgb(0, 0, 0);
        }
        .card:hover{
          transform: scale(1.1);
          box-shadow: 0 4px 8px rgb(42, 23, 161);
          transition: 0.3s;
        }
        .sub-card:hover{
          transform: scale(1.1);
          box-shadow: 0 4px 8px rgb(42, 23, 161);
          transition: 0.3s;
        }
        .card{
            border: 2px solid black;
            width:250px;
            text-align:center;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 5px;
            background-color: rgb(214, 98, 98);
            box-shadow: o 4px 8px rgb(0, 0, 0);
            margin: 10px;
        }
        .sub-card img{
             width:75px;
             height:75px;
             object-fit: cover;
             border-radius: 11px;
             display: flex;
        }  
            
        .sub-card{
            height: 75px;
            width: 75px;
            border-radius: 11px;
            display: flex;
            margin-bottom: 5px;
            display: flex;
        }
    </style>
</head>
<body>
    <div class="product">
       <div class="card">
           <h2>Ready for Race</h2>
           <img src="https://images.pexels.com/photos/28832062/pexels-photo-28832062.jpeg" > 
       </div>


       <div class="card">
           <h2>SUV</h2>

          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/17688188/pexels-photo-17688188.jpeg">
          </div>

          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/23939454/pexels-photo-23939454.jpeg">
          </div>


          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/29057945/pexels-photo-29057945.jpeg">
          </div>

          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/31694854/pexels-photo-31694854.jpeg">
          </div>

        
        </div>

        <div class="card">
           <h2>luxury</h2>
           
          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/3764984/pexels-photo-3764984.jpeg">
          </div>

          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/4056598/pexels-photo-4056598.jpeg">
          </div>


          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/19959632/pexels-photo-19959632.jpeg">
          </div>

          <div class="sub-card" height="75px" width="75px">
            <img src="https://images.pexels.com/photos/15513825/pexels-photo-15513825.jpeg">
          </div>

        
        </div>


        <div class="card">
           <h2>Ready for Off-roading</h2>
           <img src="https://images.pexels.com/photos/34920798/pexels-photo-34920798.jpeg" > 
       </div>


    </div>
</body>
</html>
